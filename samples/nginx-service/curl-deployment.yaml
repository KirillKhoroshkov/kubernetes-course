apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-demo
  template:
    metadata:
      labels:
        app: curl-demo
    spec:
      containers:
        - name: curl
          image: curlimages/curl:latest
          command: [ "sleep", "infinity" ]
