{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "miniapp-chart.fullname" . }}
  labels:
    {{- include "miniapp-chart.labels" . | nindent 4 }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: {{ include "miniapp-chart.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

{{- end }}
